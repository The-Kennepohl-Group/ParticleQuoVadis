<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle, Quo Vadis?</title>
  <meta name="description" content="An interactive comparison of classical and quantum particles in a one-dimensional box. A teaching tool for chemistry and physics students." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100vh; background: #0e1320; }
    body { font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      color: #9aa0b4; font-family: 'JetBrains Mono', monospace; font-size: 14px;
    }
    #error {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      color: #e8745a; font-family: 'JetBrains Mono', monospace; font-size: 13px;
      padding: 24px; text-align: center; line-height: 1.5; max-width: 700px; margin: 0 auto;
    }
  </style>

  <!-- React and ReactDOM as UMD globals (no module system needed) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Babel-standalone compiles the JSX at runtime. Pinned to 7.x: this
       app renders with UMD React globals and no bundler, so it needs the
       "classic" JSX runtime (React.createElement). Babel 8's preset-react
       defaults to the "automatic" runtime, which emits
       `import { jsx } from "react/jsx-runtime"` — fatal here ("Cannot use
       import statement outside a module"). Leaving this URL unpinned let
       unpkg roll to 8.0.0 and broke the load; keep it pinned. -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <div id="loading">Loading simulation…</div>
  </div>
  <div id="error"></div>

  <!--
    The simulation source lives in src/ParticleQuoVadis.js for easy reading
    and editing. Babel-standalone compiles the JSX in the browser at load time.
    No build step needed.

    Dev cache-bust: the inline script below appends ?v=<page-load-time> to the
    source URL so an edit-and-refresh cycle always pulls the fresh file rather
    than a stale HTTP-cached copy. Harmless in production — the static host's
    own URL cache still kicks in on the index.html request.
  -->
  <script>
    document.write(
      '<script type="text/babel" data-presets="react" src="./src/ParticleQuoVadis.js?v=' +
      Date.now() + '"><\/script>'
    );
  </script>

  <!-- Mount the app once Babel has compiled the JSX above -->
  <script type="text/babel" data-presets="react">
    // Wait for Babel to finish compiling the src file above
    function tryMount() {
      if (typeof ParticleQuoVadis === 'function') {
        const loading = document.getElementById('loading');
        if (loading) loading.remove();
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ParticleQuoVadis />);
      } else {
        setTimeout(tryMount, 50);
      }
    }
    tryMount();
  </script>

  <script>
    // If something fails to load (CDN blocked, missing file, etc.), replace
    // the "Loading…" placeholder with a useful message rather than a blank page.
    let mounted = false;
    setTimeout(() => {
      const root = document.getElementById('root');
      if (root && root.firstElementChild && root.firstElementChild.id === 'loading') {
        // Still showing the loading placeholder after 8 seconds — something failed.
        const loading = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        if (loading) loading.style.display = 'none';
        if (errorEl) {
          errorEl.style.display = 'flex';
          errorEl.innerHTML = 'The simulation did not load. Likely causes:<br><br>' +
            '&bull; Slow or blocked CDN (React or Babel from unpkg.com)<br>' +
            '&bull; The JSX source file is missing or moved<br>' +
            '&bull; A JavaScript error — open the browser console (F12) for details';
        }
      }
    }, 8000);
    window.addEventListener('error', (e) => {
      console.error('Load error:', e.message, e.filename, e.lineno);
    });
  </script>
</body>
</html>
