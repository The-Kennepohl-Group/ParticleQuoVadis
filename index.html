<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle, Quo Vadis?</title>
  <meta name="description" content="An interactive comparison of classical and quantum particles in a one-dimensional box. A teaching tool for chemistry and physics students." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100vh; background: #0e1320; }
    body { font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      color: #9aa0b4; font-family: 'JetBrains Mono', monospace; font-size: 14px;
    }
    #error {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      color: #e8745a; font-family: 'JetBrains Mono', monospace; font-size: 13px;
      padding: 24px; text-align: center; line-height: 1.5;
    }
  </style>

  <!--
    Importmap: tells the browser where to find React when the JSX uses
    `import React from 'react'`. esm.sh serves these as proper ES modules,
    so no build step is needed — Babel-standalone handles JSX transformation
    in the browser at load time.
  -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>

  <!-- Babel-standalone compiles the JSX at runtime -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <div id="loading">Loading simulation…</div>
  </div>
  <div id="error"></div>

  <!--
    The simulation source lives in src/ParticleQuoVadis.jsx for easy reading.
    Babel transforms it into a real ES module and the browser runs it.
  -->
  <script type="text/babel" data-type="module" data-presets="react">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import ParticleQuoVadis from './src/ParticleQuoVadis.jsx';

    const loading = document.getElementById('loading');
    if (loading) loading.remove();
    createRoot(document.getElementById('root')).render(<ParticleQuoVadis />);
  </script>

  <script>
    // Surface load-time errors so a student opening the file gets a hint
    // rather than a blank page when something fails (e.g. offline, blocked CDN).
    window.addEventListener('error', (e) => {
      const loading = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      if (loading) loading.style.display = 'none';
      if (errorEl) {
        errorEl.style.display = 'flex';
        errorEl.textContent = 'Could not load the simulation. Check your internet connection and refresh, or open the README for troubleshooting.';
      }
    });
  </script>
</body>
</html>
